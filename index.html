<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finansal Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0d12;--bg2:#13161e;--bg3:#1a1e28;--brd:#1e2330;--brd2:#2a3045;--tx:#dde1ec;--tx2:#8a94aa;--tx3:#44506a;--gr:#00c87a;--grd:rgba(0,200,122,.09);--rd:#f0405a;--rdd:rgba(240,64,90,.09);--gld:#f0b429;--bl:#4090f0;--bld:rgba(64,144,240,.1);--r:10px}
[data-tema="acik"]{--bg:#f0f2f7;--bg2:#ffffff;--bg3:#e4e8f0;--brd:#d0d5e2;--brd2:#b8bfd0;--tx:#1a1f2e;--tx2:#5a6380;--tx3:#8a92aa;--gr:#00a862;--grd:rgba(0,168,98,.08);--rd:#d93050;--rdd:rgba(217,48,80,.08);--gld:#c8860a;--bl:#2070d0;--bld:rgba(32,112,208,.1)}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.nav{display:flex;padding:.5rem .75rem;background:var(--bg2);border-bottom:.5px solid var(--brd);position:sticky;top:0;z-index:10;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.nav-tabs{display:flex;gap:2px;flex-wrap:wrap}
.nb{font-size:13px;padding:7px 14px;border-radius:var(--r);border:none;background:transparent;color:var(--tx2);cursor:pointer;touch-action:manipulation;min-height:36px}
.nb:hover,.nb.on{background:var(--bg3);color:var(--tx);font-weight:500}
.pg{display:none;padding:.875rem;max-width:1100px;margin:0 auto;width:100%}
.pg.on{display:block}
.ph h2{font-size:19px;font-weight:600;margin-bottom:.25rem}
.ph p{font-size:12px;color:var(--tx2);margin-bottom:.875rem}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:.875rem}
@media(min-width:400px){.stats{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.stats{grid-template-columns:repeat(5,1fr)}}
.sc{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);padding:.75rem}
.sl{font-size:10px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:17px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums}
.sv.r{color:var(--rd)}.sv.g{color:var(--gr)}.sv.b{color:var(--bl)}.sv.gold{color:var(--gld)}
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;flex-wrap:wrap;gap:8px}
.dn{display:flex;align-items:center;gap:6px}
.da{font-size:14px;font-weight:500}
.bts{display:flex;gap:6px;flex-wrap:wrap}
.btn{font-size:12px;padding:5px 11px;border-radius:var(--r);border:.5px solid var(--brd2);background:var(--bg2);color:var(--tx);cursor:pointer;touch-action:manipulation;transition:all .15s}
.btn:hover{background:var(--bg3)}
.btg{border-color:var(--gr);background:var(--grd);color:var(--gr)}.btg:hover{background:var(--gr);color:#000}
.btb{border-color:var(--bl);background:var(--bld);color:var(--bl)}.btb:hover{background:var(--bl);color:#fff}
.kl{display:flex;flex-direction:column;gap:6px}
.kc{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);overflow:hidden}
.kc.dk{opacity:.35}
.kh{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer;gap:8px;user-select:none;touch-action:manipulation}
.kh:hover{background:var(--bg3)}
.khl{flex:1;min-width:0}
.kad{font-size:15px;font-weight:600;line-height:1.3}
.ksub{font-size:13px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.krow-nums{display:flex;flex-direction:row;align-items:center;gap:8px;flex-wrap:nowrap}
.krow-asgari{font-size:12px;color:var(--tx2);white-space:nowrap;font-variant-numeric:tabular-nums;padding:2px 7px;background:var(--bg3);border-radius:5px;border:.5px solid var(--brd2)}
.krow-donem{font-size:16px;font-weight:700;color:var(--gld);white-space:nowrap;font-variant-numeric:tabular-nums;padding:4px 11px;background:rgba(240,180,41,.13);border-radius:7px;border:1.5px solid rgba(240,180,41,.5)}
.krow-toplam{font-size:19px;font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:90px;text-align:right}
.kb{border-top:.5px solid var(--brd);padding:.875rem 1rem;display:none}
.kb.on{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.875rem}
@media(min-width:520px){.fg{grid-template-columns:repeat(4,1fr)}}
.fi{display:flex;flex-direction:column;gap:3px}
.fl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.e{outline:none;border-radius:4px;padding:3px 5px;cursor:text;background:transparent;display:block;width:100%;font-size:15px;font-weight:500;color:var(--tx);border:.5px solid transparent;min-height:30px;-webkit-user-select:text;user-select:text;font-variant-numeric:tabular-nums}
.e:hover{background:var(--bg3)}
.e:focus{background:var(--bld);color:var(--bl);border-color:var(--bl)}
.fv{font-size:15px;font-weight:500;font-variant-numeric:tabular-nums}
.kbs{display:flex;gap:6px;flex-wrap:wrap}
.od{font-size:12px;padding:6px 14px;border-radius:var(--r);border:.5px solid var(--gr);color:var(--gr);background:var(--grd);cursor:pointer;touch-action:manipulation;transition:all .15s}
.od:hover{background:var(--gr);color:#000}
.od.dn2{border-color:var(--brd2);color:var(--tx2);background:transparent}
.dlb{font-size:12px;padding:6px 10px;border-radius:var(--r);border:.5px solid var(--brd2);color:var(--tx3);background:transparent;cursor:pointer;transition:all .15s}
.dlb:hover{border-color:var(--rd);color:var(--rd)}
.ak{display:flex;align-items:center;justify-content:center;padding:11px;font-size:13px;color:var(--tx3);cursor:pointer;border:.5px dashed var(--brd2);border-radius:var(--r);margin-top:4px;touch-action:manipulation;transition:all .15s}
.ak:hover{color:var(--gr);border-color:var(--gr);background:var(--grd)}
.cv{font-size:11px;color:var(--tx3);transition:transform .18s;flex-shrink:0}
.cv.on{transform:rotate(180deg)}
.box{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.bxh{padding:.85rem 1.1rem;border-bottom:.5px solid var(--brd);font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.brow{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;border-bottom:.5px solid var(--brd)}
.brow:last-child{border-bottom:none}
.brow:nth-child(odd){background:var(--bg2)}
.brow:nth-child(even){background:var(--bg3)}
.brow:hover{background:var(--bld)!important}
.brl{font-size:17px;color:var(--tx)}
.brv{font-size:18px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.px-row{display:flex;gap:14px;padding:.875rem 1rem;flex-wrap:wrap;align-items:flex-end}
.pxi{display:flex;flex-direction:column;gap:3px}
.pxl{font-size:12px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.pxv{font-size:19px;font-weight:700;color:var(--gld);font-variant-numeric:tabular-nums}
.pxinp{font-size:13px;padding:5px 8px;border-radius:var(--r);border:.5px solid var(--brd2);background:var(--bg3);color:var(--tx);width:120px;margin-top:3px}
.pxinp:focus{outline:none;border-color:var(--bl)}
.bg2c{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:620px){.bg2c{grid-template-columns:1fr 1fr}}
.yr{display:flex;align-items:flex-start;padding:.875rem 1rem;border-bottom:.5px solid var(--brd);gap:12px;flex-wrap:wrap}
.yr:last-child{border-bottom:none}
.yr:nth-child(odd){background:var(--bg2)}
.yr:nth-child(even){background:var(--bg3)}
.yr:hover{background:var(--bld)!important}
.ycol{display:flex;flex-direction:column;gap:4px;min-width:90px}
.ysem{min-width:80px}
.yfl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.ytip-sel{background:var(--bg3);border:.5px solid var(--brd2);color:var(--tx2);border-radius:4px;padding:3px 6px;font-size:11px}
.px-b{font-size:10px;padding:3px 8px;border-radius:4px}
.px-ok{background:var(--grd);border:.5px solid var(--gr);color:var(--gr)}
.px-loading{background:var(--bld);border:.5px solid var(--bl);color:var(--bl)}
.px-err{background:var(--rdd);border:.5px solid var(--rd);color:var(--rd)}
.spin{display:inline-block;width:9px;height:9px;border:1.5px solid var(--brd2);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb{position:sticky;bottom:0;background:var(--bg2);border-top:.5px solid var(--brd);padding:.625rem .875rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;z-index:10}
.sm{font-size:12px;color:var(--tx2)}
.neg{color:var(--rd)!important}
.r{color:var(--rd)!important}.g{color:var(--gr)!important}.b{color:var(--bl)!important}
.sync-info{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;display:inline-block;flex-shrink:0}
.sync-dot.ok{background:#00c87a}.sync-dot.err{background:#f0405a}.sync-dot.loading{background:#f0b429;animation:pulse 1s infinite}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
@media(max-width:400px){.pg{padding:.5rem}.kh{padding:.625rem .75rem}.kb{padding:.75rem .75rem}.kad{font-size:14px}.krow-toplam{font-size:16px}.sv{font-size:15px}}
</style>
</head>
<body>
<div class="app">
<nav class="nav">
  <div class="nav-tabs">
    <button class="nb on" onclick="gp('bankalar',this)">Bankalar</button>

  <div class="bg2c">

  </div>

<div class="pg" id="pg-yatirimlar">

  <div class="box" id="yat-list"></div>
  <div class="ak" onclick="yEkle()">＋ Yatırım Ekle</div>
</div>

<div class="sb">

  <div class="bts">

</div>
</div>

async function kaydet(){

function geriAl(){if(!hist.length){msg('Geri alınacak yok');return;}S=JSON.parse(hist.pop());idx=S.donemler.length-1;render();msg('↩ Geri alındı');}
function msg(m,t=2000){const el=document.getElementById('smsg');if(el){el.textContent=m;setTimeout(()=>el.textContent='',t);}}
function gp(id,el){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('pg-'+id).classList.add('on');el.classList.add('on');}
function fUygula(){
  const u=parseFloat(document.getElementById('inpusd').value);
  const a24=parseFloat(document.getElementById('inpau24').value);
  const a22=parseFloat(document.getElementById('inpau22').value);
  const cy=parseFloat(document.getElementById('inpceyrek').value);
  if(!isNaN(u))S.fiyatlar.usd=u;
  if(!isNaN(a24))S.fiyatlar.au24=a24;
  if(!isNaN(a22))S.fiyatlar.au22=a22;
  if(!isNaN(cy))S.fiyatlar.ceyrek=cy;
  render();msg('✓ Fiyatlar güncellendi');
}

function yeniDonem(){
  const son=S.donemler[S.donemler.length-1];
  let ay=son.ay+1,yil=son.yil;
  if(ay>12){ay=1;yil++;}
  const yK=son.kartlar.map(k=>({...k,odendi:false,toplam_borc:k.odendi?0:k.toplam_borc,kull_limit:k.limit>0?k.limit-(k.odendi?0:k.toplam_borc):0}));
  S.donemler.push({ay,yil,kartlar:yK});
  idx=S.donemler.length-1;
  render();msg('+ Yeni dönem eklendi');
}
function dg(y){idx=Math.max(0,Math.min(S.donemler.length-1,idx+y));rB();}
function kEkle(){S.donemler[idx].kartlar.push({ad:'Yeni Kart',tip:'kart',asgari:0,donem_borcu:0,son_odeme:'',hesap_kesim:'',limit:0,toplam_borc:0,kull_limit:0,odendi:false});rB();}
function kSil(ki,e){e.stopPropagation();if(!confirm('Silinsin mi?'))return;S.donemler[idx].kartlar.splice(ki,1);acik.delete(ki);rB();}
function togK(ki){if(acik.has(ki))acik.delete(ki);else acik.add(ki);rB();}
function kTip(ki,v){S.donemler[idx].kartlar[ki].tip=v;rB();}
function kEdit(ki,f,el){
  const k=S.donemler[idx].kartlar[ki];
  const raw=el.textContent.trim();
  if(f==='son_odeme'||f==='hesap_kesim'||f==='ad'){k[f]=raw;rB();return;}
  const n=parseFloat(raw.replace(/\./g,'').replace(',','.'));
  k[f]=isNaN(n)?raw:n;
  if(f==='toplam_borc'||f==='limit')k.kull_limit=k.limit>0?k.limit-k.toplam_borc:k.kull_limit;
  rB();
}
function odendi(ki,e){
  e.stopPropagation();
  const k=S.donemler[idx].kartlar[ki];
  const kredi=k.tip==='kredi';
  if(!k.odendi){
    k.toplam_borc=Math.max(0,k.toplam_borc-(k.donem_borcu||0));
    if(!kredi)k.kull_limit=k.limit>0?k.limit-k.toplam_borc:(k.kull_limit+(k.donem_borcu||0));
    k.odendi=true;
  }else{
    k.toplam_borc+=(k.donem_borcu||0);
    if(!kredi)k.kull_limit=k.limit>0?k.limit-k.toplam_borc:Math.max(0,k.kull_limit-(k.donem_borcu||0));
    k.odendi=false;
  }
  rB();
}

function rB(){
  const d=S.donemler[idx];
  document.getElementById('d-adi').textContent=AY[d.ay-1]+' '+d.yil+(idx===S.donemler.length-1?' · Güncel':'');
  let tB=0,tA=0,tD=0,tL=0,tK=0;
  d.kartlar.forEach(k=>{tB+=k.toplam_borc||0;if(!k.odendi){tA+=k.asgari||0;tD+=k.donem_borcu||0;}tL+=k.limit||0;tK+=k.kull_limit||0;});
  document.getElementById('b-stats').innerHTML=
    '<div class="sc"><div class="sl">Toplam Borç</div><div class="sv r">'+N(tB)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Bu Ay Asgari</div><div class="sv">'+N(tA)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Bu Ay Dönem</div><div class="sv gold">'+N(tD)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Toplam Limit</div><div class="sv">'+N(tL)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Kullanılabilir</div><div class="sv g">'+N(tK)+' ₺</div></div>';
  document.getElementById('kl').innerHTML=d.kartlar.map((k,ki)=>{
    const ac=acik.has(ki),akt=k.toplam_borc>0&&!k.odendi,neg=k.kull_limit<0;
    return'<div class="kc'+(k.odendi?' dk':'')+'">'+
      '<div class="kh" onclick="togK('+ki+')">'+
        '<div class="khl"><div class="kad">'+k.ad+'</div>'+
        '<div class="ksub">'+(k.son_odeme?'Son ödeme: '+k.son_odeme:'')+(k.limit>0?' · Limit: '+N(k.limit)+' ₺':'')+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<div class="krow-nums">'+
            (k.asgari>0?'<div class="krow-asgari">Asg: '+N(k.asgari)+' ₺</div>':'')+
            (k.donem_borcu>0?'<div class="krow-donem">Dönem: '+N(k.donem_borcu)+' ₺</div>':'')+
            '<div class="krow-toplam'+(akt?' r':'')+'">'+( akt?N(k.toplam_borc)+' ₺':'—')+'</div>'+
          '</div>'+
          '<span class="cv'+(ac?' on':'')+'">▾</span></div></div>'+
      '<div class="kb'+(ac?' on':'')+'">'+
        '<div class="fg">'+
          '<div class="fi"><div class="fl">Tip</div><select class="e" onchange="kTip('+ki+',this.value)" style="cursor:pointer"><option value="kart"'+(k.tip!=='kredi'?' selected':'')+'>Kredi Kartı</option><option value="kredi"'+(k.tip==='kredi'?' selected':'')+'>Kredi</option></select></div>'+
          '<div class="fi"><div class="fl">Kart Adı</div><span class="e" contenteditable onblur="kEdit('+ki+',\'ad\',this)">'+k.ad+'</span></div>'+
          '<div class="fi"><div class="fl">Toplam Borç ₺</div><span class="e'+(akt?' r':'')+'" contenteditable onblur="kEdit('+ki+',\'toplam_borc\',this)">'+N(k.toplam_borc)+'</span></div>'+
          '<div class="fi"><div class="fl">Asgari ₺</div><span class="e" contenteditable onblur="kEdit('+ki+',\'asgari\',this)">'+N(k.asgari)+'</span></div>'+
          '<div class="fi"><div class="fl">Dönem Borcu ₺</div><span class="e" contenteditable onblur="kEdit('+ki+',\'donem_borcu\',this)">'+N(k.donem_borcu)+'</span></div>'+
          '<div class="fi"><div class="fl">Son Ödeme</div><span class="e" contenteditable onblur="kEdit('+ki+',\'son_odeme\',this)">'+(k.son_odeme||'')+'</span></div>'+
          '<div class="fi"><div class="fl">Hesap Kesim</div><span class="e" contenteditable onblur="kEdit('+ki+',\'hesap_kesim\',this)">'+(k.hesap_kesim||'')+'</span></div>'+
          '<div class="fi"><div class="fl">Limit ₺</div><span class="e" contenteditable onblur="kEdit('+ki+',\'limit\',this)">'+N(k.limit)+'</span></div>'+
          '<div class="fi"><div class="fl">Kullanılabilir ₺</div><div class="fv'+(neg?' neg':'')+'">'+N(k.kull_limit)+'</div></div>'+
        '</div>'+
        '<div class="kbs">'+
          '<button class="od'+(k.odendi?' dn2':'')+'" onclick="odendi('+ki+',event)">'+(k.odendi?'↩ Geri Al':'✓ Ödendi')+'</button>'+
          '<button class="dlb" onclick="kSil('+ki+',event)">Sil</button>'+
        '</div></div></div>';
  }).join('');
}

function calcBil(){
  const b=S.bilanco,f=S.fiyatlar;
  const banka=S.donemler[idx].kartlar.reduce((s,k)=>s+(k.toplam_borc||0),0);
  const yatirimTL=(S.yatirimlar||[]).reduce((s,y)=>s+(parseFloat(y.adet)||0)*(parseFloat(y.fiyat_usd)||0)*(parseFloat(f.usd)||0),0);
  const V={'Şahsi Banka Maden':(b.gram_sahsi||0)*f.au24,'Fiziki Mad. 24 Ayar':(b.gram_24||0)*f.au24,'Büşra Banka Maden':(b.gram_busra||0)*f.au24,'BES Yatırımları':b.bes||0,'Fiziki Mad. 22 Ayar':(b.gram_22||0)*f.au22,'Fiziki Mad. Çeyrek':(b.gram_ceyrek||0)*f.ceyrek,'Nakit TL':b.nakit_tl||0,'Nakit Dolar':(b.nakit_dolar||0)*f.usd,'Yatırım Portföyü':yatirimTL};
  const B={'Toplam Banka Borcu':banka,'Bekir Dolar':(b.bekir_dolar||0)*f.usd,'Kayınvalide Borcu':b.kayinvalide||0};
  const tv=Object.values(V).reduce((s,v)=>s+v,0),tb=Object.values(B).reduce((s,v)=>s+v,0);
  return{V,B,tv,tb,nv:tv-tb};
}
function bilEdit(key,el){const r=el.textContent.trim().replace(/\./g,'').replace(',','.');const n=parseFloat(r);if(!isNaN(n))S.bilanco[key]=n;rBil();}
function rBil(){
  const{V,B,tv,tb,nv}=calcBil();const f=S.fiyatlar,b=S.bilanco;
  document.getElementById('bil-stats').innerHTML=
    '<div class="sc"><div class="sl">Toplam Varlık</div><div class="sv b">'+N(tv)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Toplam Borç</div><div class="sv r">'+N(tb)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Net Varlık</div><div class="sv'+(nv>=0?' g':' r')+'">'+N(nv)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">USD/TRY</div><div class="sv gold">'+NF(f.usd,4)+'</div></div>'+
    '<div class="sc"><div class="sl">24 Ayar Gram</div><div class="sv gold">'+N(f.au24)+' ₺</div></div>';
  document.getElementById('pxusd').textContent=NF(f.usd,4)+' ₺';
  document.getElementById('pxau24').textContent=N(f.au24)+' ₺';
  document.getElementById('pxau22').textContent=N(f.au22)+' ₺';
  document.getElementById('pxceyrek').textContent=N(f.ceyrek)+' ₺';
  const vR=[
    {l:'Şahsi Banka Maden',k:'gram_sahsi',u:'gram',v:V['Şahsi Banka Maden']},
    {l:'Fiziki Mad. 24 Ayar',k:'gram_24',u:'gram',v:V['Fiziki Mad. 24 Ayar']},
    {l:'Büşra Banka Maden',k:'gram_busra',u:'gram',v:V['Büşra Banka Maden']},
    {l:'Fiziki Mad. 22 Ayar',k:'gram_22',u:'gram',v:V['Fiziki Mad. 22 Ayar']},
    {l:'Fiziki Mad. Çeyrek',k:'gram_ceyrek',u:'adet',v:V['Fiziki Mad. Çeyrek']},
    {l:'BES Yatırımları',k:'bes',u:'₺',v:V['BES Yatırımları']},
    {l:'Nakit TL',k:'nakit_tl',u:'₺',v:V['Nakit TL']},
    {l:'Nakit Dolar',k:'nakit_dolar',u:'$',v:V['Nakit Dolar']},
    {l:'Yatırım Portföyü',k:null,u:'',v:V['Yatırım Portföyü'],auto:true}
  ];
  document.getElementById('bil-v').innerHTML=vR.map(r=>
    '<div class="brow"><div class="brl">'+r.l+
    (r.auto
      ? '<br><span style="font-size:13px;color:var(--tx3)">Yatırımlar sayfasından otomatik</span>'
      : '<br><span class="e" contenteditable style="font-size:16px;font-weight:600;display:inline-block;min-width:50px;margin-top:2px" onblur="bilEdit(\''+r.k+'\',this)">'+NF(b[r.k],4)+'</span> <span style="font-size:14px;color:var(--tx2)">'+r.u+'</span>'
    )+
    '</div><div class="brv b">'+N(r.v)+' ₺</div></div>'
  ).join('');
  document.getElementById('bil-tv').textContent=N(tv)+' ₺';
  const bR=[
    {l:'Banka Borçları',v:B['Toplam Banka Borcu'],auto:true},
    {l:'Bekir Dolar',k:'bekir_dolar',u:'$',v:B['Bekir Dolar']},
    {l:'Kayınvalide Borcu',k:'kayinvalide',u:'₺',v:B['Kayınvalide Borcu']}
  ];
  document.getElementById('bil-b').innerHTML=bR.map(r=>
    '<div class="brow"><div class="brl">'+r.l+
    (r.auto
      ? '<br><span style="font-size:13px;color:var(--tx3)">Bankalar sayfasından otomatik</span>'
      : '<br><span class="e" contenteditable style="font-size:16px;font-weight:600;display:inline-block;min-width:50px;margin-top:2px" onblur="bilEdit(\''+r.k+'\',this)">'+NF(b[r.k],4)+'</span> <span style="font-size:14px;color:var(--tx2)">'+r.u+'</span>'
    )+
    '</div><div class="brv r">'+N(r.v)+' ₺</div></div>'
  ).join('');
  document.getElementById('bil-tb').textContent=N(tb)+' ₺';
}

function yEkle(){
  if(!S.yatirimlar)S.yatirimlar=[];
  S.yatirimlar.push({sem:'AAPL',tip:'hisse',adet:1,fiyat_usd:0,kar_usd:0});
  rY();
}
function ySil(i,e){e.stopPropagation();if(!confirm('Silinsin mi?'))return;S.yatirimlar.splice(i,1);rY();}
function yEdit(i,f,el){
  const raw=el.textContent.trim().replace(/\./g,'').replace(',','.');
  const n=parseFloat(raw);
  S.yatirimlar[i][f]=isNaN(n)?el.textContent.trim():n;
  if(f==='sem'){hisseFiyatCek(el.textContent.trim(),i);}
  else rY();
}
function yTip(i,v){S.yatirimlar[i].tip=v;rY();}
function rY(){
  if(!S.yatirimlar)S.yatirimlar=[];
  const f=S.fiyatlar;
  let tTL=0,tKZ=0;
  const rows=S.yatirimlar.map((y,i)=>{
    const adet=parseFloat(y.adet)||0;
    const fiyat=parseFloat(y.fiyat_usd)||0;
    const usd=parseFloat(f.usd)||38.5;
    const tl=adet*fiyat*usd;
    tTL+=tl;
    const kz=parseFloat(y.kar_usd)||0;
    tKZ+=kz;
    return '<div class="yr">'+
      '<div class="ycol ysem">'+
        '<div class="yfl">Sembol</div>'+
        '<span class="e" contenteditable spellcheck="false" onblur="yEdit('+i+',\'sem\',this)" style="font-size:16px;font-weight:700;display:block;min-width:70px">'+y.sem+'</span>'+
        '<select class="ytip-sel" style="margin-top:4px" onchange="yTip('+i+',this.value)">'+
          '<option value="hisse"'+(y.tip==='hisse'?' selected':'')+'>hisse</option>'+
          '<option value="kripto"'+(y.tip==='kripto'?' selected':'')+'>kripto</option>'+
        '</select>'+
      '</div>'+
      '<div class="ycol">'+
        '<div class="yfl">Adet</div>'+
        '<span class="e" contenteditable spellcheck="false" onblur="yEdit('+i+',\'adet\',this)" style="font-size:15px;font-weight:600;display:block">'+adet.toLocaleString('tr-TR',{maximumFractionDigits:6})+'</span>'+
      '</div>'+
      '<div class="ycol">'+
        '<div class="yfl">Birim Fiyat (USD)</div>'+
        '<span class="e" contenteditable spellcheck="false" onblur="yEdit('+i+',\'fiyat_usd\',this)" style="font-size:15px;font-weight:600;display:block">'+fiyat.toLocaleString('tr-TR',{maximumFractionDigits:2})+'</span>'+
      '</div>'+
      '<div class="ycol">'+
        '<div class="yfl">TL Değeri</div>'+
        '<div style="font-size:17px;font-weight:700;color:var(--bl)">'+N(tl)+' ₺</div>'+
        '<div style="font-size:12px;color:var(--tx3);margin-top:2px">'+(fiyat>0?(adet*fiyat).toLocaleString('tr-TR',{maximumFractionDigits:2})+' $':'—')+'</div>'+
      '</div>'+
      '<div class="ycol">'+
        '<div class="yfl">Kar/Zarar (USD)</div>'+
        '<span class="e '+(kz>=0?'g':'r')+'" contenteditable spellcheck="false" onblur="yEdit('+i+',\'kar_usd\',this)" style="font-size:15px;font-weight:600;display:block">'+(kz>=0?'+':'')+kz.toLocaleString('tr-TR',{maximumFractionDigits:2})+'</span>'+
      '</div>'+
      '<button class="dlb" onclick="ySil('+i+',event)" style="margin-left:auto;align-self:center">Sil</button>'+
    '</div>';
  }).join('');
  document.getElementById('yat-list').innerHTML=rows||'<div style="padding:1.5rem;color:var(--tx3);text-align:center">Henüz yatırım eklenmedi</div>';
  document.getElementById('yat-stats').innerHTML=
    '<div class="sc"><div class="sl">Toplam TL Değer</div><div class="sv b">'+N(tTL)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">Toplam Kar/Zarar</div><div class="sv'+(tKZ>=0?' g':' r')+'">'+(tKZ>=0?'+':'')+tKZ.toLocaleString('tr-TR',{maximumFractionDigits:2})+' $</div></div>'+
    '<div class="sc"><div class="sl">USD/TRY Kuru</div><div class="sv gold">'+NF(f.usd,4)+' ₺</div></div>'+
    '<div class="sc"><div class="sl">USD Değeri</div><div class="sv">'+((tTL/(f.usd||1)).toLocaleString('tr-TR',{maximumFractionDigits:0}))+' $</div></div>';
}

function render(){rB();rBil();rY();}

const FMP_KEY='1op1hxMpYGZijHLlitOr1nX5lrSCnDFnDFp';

async function hisseFiyatCek(sem,i){
  try{
    const url=`https://financialmodelingprep.com/api/v3/quote-short/${sem.toUpperCase()}?apikey=${FMP_KEY}`;
    const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    const j=await r.json();
    if(j&&j[0]&&j[0].price){
      S.yatirimlar[i].fiyat_usd=j[0].price;
      rY();
      msg('✓ '+sem.toUpperCase()+' fiyatı güncellendi');
    }else{msg('⚠ '+sem+' bulunamadı, fiyatı elle gir');}
  }catch(e){msg('⚠ Fiyat alınamadı, elle gir');}
}

async function fetchFiyat(){
  let usd=S.fiyatlar.usd, au24=S.fiyatlar.au24;
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY');
    const j=await r.json();
    if(j.rates?.TRY)usd=j.rates.TRY;
  }catch(e){}
  try{
    const r=await fetch('https://api.metals.live/v1/spot/gold');
    const j=await r.json();
    if(j&&j[0]&&j[0].gold)au24=(j[0].gold/31.1035)*usd;
  }catch(e){}
  S.fiyatlar={usd,au24,au22:au24*(22/24),ceyrek:au24*1.7501};
  if(S.yatirimlar&&S.yatirimlar.length){
    await Promise.allSettled(S.yatirimlar.map(async(y,i)=>{
      try{
        const url=`https://financialmodelingprep.com/api/v3/quote-short/${y.sem.toUpperCase()}?apikey=${FMP_KEY}`;
          const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
        const j=await r.json();
        if(j&&j[0]&&j[0].price)S.yatirimlar[i].fiyat_usd=j[0].price;
      }catch(e){}
    }));
  }
  render();msg('✓ Fiyatlar güncellendi');
}

function togTema(){
  const html=document.documentElement;
  const yeni=html.getAttribute('data-tema')==='acik'?'karanlik':'acik';
  html.setAttribute('data-tema',yeni);
  const btn=document.getElementById('tema-btn');
  if(btn)btn.textContent=yeni==='acik'?'🌙':'☀️';
  localStorage.setItem('fp_tema',yeni);
}

// Global atamalar (type=module için)
window.gp=gp;window.dg=dg;window.yeniDonem=yeniDonem;window.kEkle=kEkle;
window.togK=togK;window.kTip=kTip;window.kEdit=kEdit;window.odendi=odendi;window.kSil=kSil;
window.geriAl=geriAl;window.kaydet=kaydet;window.fUygula=fUygula;
window.bilEdit=bilEdit;window.yEkle=yEkle;window.ySil=ySil;window.yEdit=yEdit;window.yTip=yTip;
window.togTema=togTema;window.fetchFiyat=fetchFiyat;

// Tema uygula
(function(){
  const t=localStorage.getItem('fp_tema')||'karanlik';
  document.documentElement.setAttribute('data-tema',t);
  const btn=document.getElementById('tema-btn');
  if(btn)btn.textContent=t==='acik'?'🌙':'☀️';
})();

// Firebase realtime sync
setSyncStatus('loading','Bağlanıyor...');
onSnapshot(doc(db,'finansal','veriler'),(snap)=>{
  if(snap.exists()){
    const uzak=snap.data();
    if(uzak&&typeof uzak==='object'){
      S=uzak;
      if(!S.donemler||!S.donemler.length)S=JSON.parse(JSON.stringify(DEF));
      if(!S.yatirimlar)S.yatirimlar=[];
      S.donemler.forEach(d=>{if(d.kartlar)d.kartlar.forEach(k=>{k.kull_limit=k.limit>0?k.limit-k.toplam_borc:k.kull_limit||0;});});
      idx=Math.min(idx,S.donemler.length-1);
      localStorage.setItem('fp_nl',JSON.stringify(S));
      render();
      setSyncStatus('ok','Güncellendi ✓');
    }
  }else{
    kaydet();
    setSyncStatus('ok','Bağlı ✓');
  }
},(err)=>{console.error(err);setSyncStatus('err','Bağlantı hatası');});

render();
</script>
